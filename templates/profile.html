{% extends "base.html" %}
{% block content %}
<div class="card profile-card">
    <h2>个人中心</h2>
    {% if error %}
        <div class="error-msg">{{ error }}</div>
    {% endif %}
    {% if user %}
        <div class="user-info">
            <h3>用户资料</h3>
            <ul class="info-list">
                <li><span class="label">ID：</span>{{ user['id'] }}</li>
                <li><span class="label">用户名：</span>{{ user['username'] }}</li>
                <li><span class="label">邮箱：</span>{{ user['email'] }}</li>
                <li><span class="label">手机：</span>{{ user['phone'] }}</li>
                <li><span class="label">余额：</span>{{ user['balance'] }}</li>
            </ul>
        </div>

        <div class="recharge-section">
            <h3>充值</h3>
            <form method="post" action="/recharge" class="recharge-form">
                <div class="form-group">
                    <label for="amount">充值金额</label>
                    <input type="number" id="amount" name="amount" placeholder="请输入充值金额"
                           step="0.01" min="0.01" max="100000" required>
                </div>
                <button type="submit" class="btn btn-recharge">立即充值</button>
            </form>
        </div>
    {% endif %}
</div>
{% endblock %}
