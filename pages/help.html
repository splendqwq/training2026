    <h1>帮助中心</h1>
    <p>欢迎使用用户管理系统！以下是一些常见问题和使用指南。</p>

    <h2>功能介绍</h2>
    <ul>
        <li><strong>用户登录</strong>：使用用户名和密码登录系统</li>
        <li><strong>用户注册</strong>：新用户可注册账号</li>
        <li><strong>个人中心</strong>：查看个人资料和余额</li>
        <li><strong>充值</strong>：为账户充值</li>
        <li><strong>头像上传</strong>：上传个人头像</li>
        <li><strong>用户搜索</strong>：搜索系统中的用户</li>
    </ul>

    <h2>常见问题</h2>
    <h3>如何修改密码？</h3>
    <p>请联系管理员修改密码。</p>

    <h3>充值多久到账？</h3>
    <p>充值后立即到账，可在个人中心查看余额变化。</p>

    <h3>如何联系客服？</h3>
    <p>请发送邮件至 support@example.com</p>
